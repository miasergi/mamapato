<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos · Mamá Pato Benicarló</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{duck:{50:"#eef7fb",100:"#c5e8f5",200:"#8ed4ee",300:"#50b9e0",400:"#2ba4cc",500:"#2596be",600:"#2596be",700:"#1e7da3",800:"#176585",900:"#12506b"}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <script src="../../js/icons.js"></script>
  <script src="../../js/data.js"></script>
  <script src="../../js/components.js"></script>
</head>
<body class="bg-gray-50">
  <div id="public-header"></div>

  <div class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Todos nuestros productos</h1>
    <p class="text-gray-500 mb-8">Las mejores marcas para tu bebé · Benicarló</p>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-4 mb-8">
      <input type="text" id="search" placeholder="Buscar producto…"
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-duck-400"
        oninput="renderProducts()">
      <select id="cat-filter" onchange="renderProducts()"
        class="border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-duck-400 bg-white">
        <option value="">Todas las categorías</option>
      </select>
    </div>

    <div id="results-count" class="text-sm text-gray-500 mb-4"></div>
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

    <div id="empty" class="hidden text-center py-16 text-gray-400">
      <div class="text-duck-300 mb-4 flex justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
      <p class="font-medium">No se encontraron productos</p>
      <button onclick="clearFilters()" class="mt-4 text-duck-600 underline text-sm">Limpiar filtros</button>
    </div>
  </div>

  <div id="public-footer"></div>
  <a href="https://wa.me/34964000000" target="_blank" class="whatsapp-fab">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script>
    renderPublicHeader('../../', 'productos');
    renderPublicFooter('../../');

    // Populate category filter
    const sel = document.getElementById('cat-filter');
    CATEGORIES.forEach(c => {
      const opt = document.createElement('option'); opt.value = c; opt.textContent = c; sel.appendChild(opt);
    });

    // Pre-select from URL param
    const urlCat = new URLSearchParams(window.location.search).get('cat');
    if (urlCat) sel.value = urlCat;

    function renderProducts() {
      const q   = document.getElementById('search').value.toLowerCase();
      const cat = document.getElementById('cat-filter').value;
      const filtered = DEMO_PRODUCTS.filter(p =>
        (!q   || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) &&
        (!cat || p.category === cat)
      );
      const grid = document.getElementById('products-grid');
      document.getElementById('empty').classList.toggle('hidden', filtered.length > 0);
      document.getElementById('results-count').textContent = `${filtered.length} producto${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}`;
      grid.innerHTML = '';
      filtered.forEach(p => {
        const stockBadge = p.stock_web > 0
          ? `<span class="badge bg-green-100 text-green-700">En stock (${p.stock_web})</span>`
          : `<span class="badge bg-gray-100 text-gray-500">Sin stock web</span>`;
        const statusBadge = p.status !== 'active'
          ? `<span class="badge ${statusClass(p.status)} ml-1">${statusLabel(p.status)}</span>` : '';
        grid.innerHTML += `
          <a href="${p.slug}/index.html" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden card-hover group block">
            <div class="bg-duck-50 h-44 flex items-center justify-center text-duck-400 group-hover:bg-duck-100 transition-colors">${ICON[p.iconName] ? ICON[p.iconName](64) : ICON.box(64)}</div>
            <div class="p-4">
              <div class="flex flex-wrap gap-1 mb-2">${stockBadge}${statusBadge}</div>
              <h3 class="font-semibold text-gray-900 text-sm leading-snug mb-1 group-hover:text-duck-700">${p.name}</h3>
              <p class="text-xs text-gray-400 mb-3">${p.category} · ${p.sku}</p>
              <div class="text-duck-600 font-bold text-xl">${formatPrice(p.price)}</div>
            </div>
          </a>`;
      });
    }

    function clearFilters() {
      document.getElementById('search').value = '';
      document.getElementById('cat-filter').value = '';
      renderProducts();
    }

    renderProducts();
  </script>
</body>
</html>
