<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · Mamá Pato</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { duck: { 50:"#eef7fb",100:"#c5e8f5",200:"#8ed4ee",300:"#50b9e0",400:"#2ba4cc",500:"#2596be",600:"#2596be",700:"#1e7da3",800:"#176585",900:"#12506b" } } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/auth.js" defer></script>
</head>
<body class="min-h-screen bg-duck-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="../tienda/index.html">
        <img src="../logo.png" alt="Mamá Pato" class="h-16 w-auto mx-auto rounded-lg">
      </a>
      <p class="mt-2 text-gray-500 text-sm">Panel de gestión</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Bienvenido</h1>
      <p class="text-gray-500 text-sm mb-6">Accede con tu cuenta de Mamá Pato</p>

      <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-5">
        Email o contraseña incorrectos.
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" name="email" required
              value="admin@mamapato.es"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-duck-400 focus:border-transparent"
              placeholder="admin@mamapato.es">
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password" id="password" name="password" required
              value="admin123"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-duck-400 focus:border-transparent">
          </div>
          <button type="submit"
            class="w-full bg-duck-600 text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-duck-700 transition-colors mt-2">
            Entrar →
          </button>
        </div>
      </form>

      <div class="mt-6 pt-4 border-t border-gray-100 text-center">
        <a href="../tienda/index.html" class="text-sm text-gray-400 hover:text-duck-600 transition-colors">
          ← Volver a la tienda
        </a>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Demo: admin@mamapato.es / admin123</p>
  </div>

  <script>
    // If already logged in, redirect to dashboard
    if (typeof getSession === 'function' && getSession()) {
      window.location.replace('../dashboard/index.html');
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass  = document.getElementById('password').value;
      if (login(email, pass)) {
        window.location.href = '../dashboard/index.html';
      } else {
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
